<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบฐานข้อมูลยา (Drug Database)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .drug-card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #3b82f6; }
        .drug-title { font-size: 1.5rem; font-weight: bold; color: #1e3a8a; margin-top: 0; }
        .section-title { font-weight: bold; margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #4b5563; }
        .tag { background: #e0f2fe; color: #0369a1; padding: 3px 8px; border-radius: 4px; font-size: 0.85rem; margin-right: 5px; display: inline-block; }
        .fluid-tag { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>💊 ฐานข้อมูลยาทั้งหมด</h1>
    <div id="loading">กำลังโหลดข้อมูลจาก Supabase...</div>
    <div id="drug-container"></div>
</div>

<script>
    // 1. ตั้งค่าการเชื่อมต่อ Supabase
    const SUPABASE_URL = 'https://ykszirezwwiedhvmbssi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_k_m3LIwgWpaboP148KYATQ_s1sh-64Z';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    async function fetchDrugData() {
        try {
            // คำสั่ง Query แบบรวมทุกความสัมพันธ์ (Nesting)
            const { data: drugs, error } = await supabase
                .from('drugs')
                .select(`
                    drug_code,
                    drug_name,
                    drug_contents (
                        amount,
                        unit,
                        generics (generic_name)
                    ),
                    drug_administrations (
                        instructions,
                        max_conc_mg_ml,
                        min_conc_mg_ml,
                        routes (
                            route_name,
                            route_code
                        ),
                        administration_fluids (
                            fluids (short_name)
                        )
                    )
                `);

            if (error) throw error;
            renderDisplay(drugs);

        } catch (err) {
            console.error("Fetch Error:", err);
            document.getElementById('loading').innerHTML = `<p style="color:red">ขออภัย เกิดข้อผิดพลาดในการเชื่อมต่อ: ${err.message}</p>`;
        }
    }

    function renderDisplay(drugs) {
        const container = document.getElementById('drug-container');
        document.getElementById('loading').style.display = 'none';

        if (!drugs || drugs.length === 0) {
            container.innerHTML = '<center>ไม่พบข้อมูลยาในฐานข้อมูล</center>';
            return;
        }

        container.innerHTML = drugs.map(drug => `
            <div class="drug-card">
                <div class="drug-header">
                    <h2 class="drug-title">${drug.drug_name}</h2>
                    <span class="drug-code">CODE: ${drug.drug_code}</span>
                </div>

                <span class="section-label">🧪 ส่วนประกอบและความแรง (Contents)</span>
                <ul>
                    ${drug.drug_contents.map(c => `
                        <li>${c.generics.generic_name} <strong>${c.amount} ${c.unit}</strong></li>
                    `).join('')}
                </ul>

                <span class="section-label">💉 การบริหารยา (Administration)</span>
                <div>
                    ${drug.drug_administrations.map(admin => {
                        // ดึงรายชื่อสารน้ำ
                        const fluids = admin.administration_fluids.map(af => 
                            `<span class="fluid-chip">${af.fluids.short_name}</span>`
                        ).join('');

                        return `
                            <div class="admin-item">
                                <span class="route-badge">${admin.routes.route_name} (${admin.routes.route_code})</span>
                                <span>${admin.instructions || 'ไม่มีคำแนะนำพิเศษ'}</span>
                                
                                ${(admin.max_conc_mg_ml || admin.min_conc_mg_ml) ? `
                                    <span class="conc-box">
                                        ⚠️ ความเข้มข้น: 
                                        ${admin.min_conc_mg_ml ? `Min ${admin.min_conc_mg_ml}` : '-'} / 
                                        ${admin.max_conc_mg_ml ? `Max ${admin.max_conc_mg_ml}` : '-'} mg/mL
                                    </span>
                                ` : ''}

                                ${fluids ? `<div style="margin-top:8px"><strong>สารน้ำ:</strong> ${fluids}</div>` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `).join('');
    }

    // เรียกทำงาน
    fetchDrugData();
</script>

</body>
</html>
