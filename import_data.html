<script>
    function logMessage(msg) {
        const logEl = document.getElementById('log');
        logEl.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function mapResultCode(val) {
        if (!val) return null;
        const lower = val.toLowerCase();
        if (lower.includes('✅') || (lower.includes('compatible') && !lower.includes('incompatible'))) return 'C';
        if (lower.includes('❌') || lower.includes('incompatible')) return 'I';
        if (lower.includes('⚠️') || lower.includes('variable')) return 'U';
        if (lower.includes('no data')) return 'N/A';
        return val.substring(0, 5); 
    }

    // 🌟 แก้ไขล่าสุด: ทิ้งฟังก์ชันที่มีปัญหา เปลี่ยนมาใช้วิธีลบช่องว่างรวดเดียว และไม่ใช้ .trim()
    function convertToDatabaseDate(dateStr) {
        if (!dateStr) return null;
        
        // 1. แปลงเป็นอักษรแน่ๆ และลบช่องว่างออกให้เกลี้ยงก่อน (แทนการใช้ trim())
        let str = String(dateStr).replace(/\s+/g, '');
        if (!str) return null;

        // 2. ถ้ามีเครื่องหมาย / ให้หั่นส่วนประกอบออกมา
        if (str.indexOf('/') !== -1) {
            let arr = str.split('/');
            if (arr.length === 3) {
                // ต่ออักษร '0' เข้าไปข้างหน้า แล้วหยิบเอาแค่ 2 ตัวท้าย ป้องกันปัญหา Error 100%
                let day = ('0' + arr).slice(-2);
                let month = ('0' + arr).slice(-2);
                let year = arr;
                return year + '-' + month + '-' + day; 
            }
        }
        
        // 3. ถ้ามาถูกฟอร์แมตแล้ว (YYYY-MM-DD)
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
            return str;
        }

        // 4. คืนค่าตามที่ได้มาหากไม่ตรงเงื่อนไข
        return str; 
    }

    function parseCSV(file) {
        return new Promise((resolve, reject) => {
            if (!file) return reject(new Error("ไม่พบไฟล์กรุณาตรวจสอบการอัปโหลดอีกครั้ง"));
            if (typeof Papa === 'undefined') return reject(new Error("โหลดตัวอ่าน CSV (PapaParse) ไม่สำเร็จ กรุณาเช็กอินเทอร์เน็ต"));
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: (results) => resolve(results.data),
                error: (err) => reject(err)
            });
        });
    }
